    <path d="M8 17 C12 15 16 15 19 17 M8 23 C12 21 16 21 19 23 M8 29 C12 27 16 27 19 29" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
    <path d="M25 17 C28 15 32 15 36 17 M25 23 C28 21 32 21 36 23 M25 29 C28 27 32 27 36 29" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="33" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="27" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#e11d2a">Book</tspan><tspan fill="#16a34a">ish</tspan>
  </text>
</svg>
